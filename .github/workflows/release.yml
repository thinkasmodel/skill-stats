name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-13
            target: macos-amd64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name skill-stats --clean --noconfirm skill_stats.py

      - name: Rename binary with platform suffix (Unix)
        if: runner.os != 'Windows'
        run: mv dist/skill-stats dist/skill-stats-${{ matrix.target }}

      - name: Rename binary with platform suffix (Windows)
        if: runner.os == 'Windows'
        run: mv dist/skill-stats.exe dist/skill-stats-${{ matrix.target }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: skill-stats-${{ matrix.target }}
          path: dist/skill-stats-*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
